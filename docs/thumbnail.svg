<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f8f8"/>
    </linearGradient>
    <filter id="icon-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#18181b" flood-opacity="0.12"/>
    </filter>
    <filter id="text-shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#18181b" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#d4d4d8" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- App icon — dark rounded square with fork & knife -->
  <g filter="url(#icon-shadow)" transform="translate(960, 380)">
    <!-- Rounded square background -->
    <rect x="-120" y="-120" width="240" height="240" rx="48" fill="#18181b"/>

    <!-- Fork (left) -->
    <g stroke="white" stroke-width="8" stroke-linecap="round" fill="none" transform="translate(-40, 0)">
      <!-- Tines -->
      <line x1="-16" y1="-70" x2="-16" y2="-20"/>
      <line x1="0" y1="-70" x2="0" y2="-20"/>
      <line x1="16" y1="-70" x2="16" y2="-20"/>
      <!-- Neck curve -->
      <path d="M -16 -20 Q -16 0 0 0 Q 16 0 16 -20"/>
      <!-- Handle -->
      <line x1="0" y1="0" x2="0" y2="80"/>
    </g>

    <!-- Knife (right) -->
    <g stroke="white" stroke-width="8" stroke-linecap="round" fill="none" transform="translate(40, 0)">
      <!-- Blade -->
      <path d="M 0 -70 L 16 -70 Q 20 -70 20 -60 L 20 -10 Q 20 0 10 0 L 0 0"/>
      <!-- Handle -->
      <line x1="0" y1="0" x2="0" y2="80"/>
    </g>
  </g>

  <!-- App name -->
  <g filter="url(#text-shadow)">
    <text x="960" y="600" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#18181b" text-anchor="middle" letter-spacing="-1.5">My Recipe App</text>
  </g>

  <!-- Tagline -->
  <text x="960" y="660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#71717a" text-anchor="middle" letter-spacing="0.5">Your personal recipe library</text>

  <!-- Tech badges row -->
  <g transform="translate(960, 740)">
    <!-- Next.js -->
    <rect x="-340" y="0" width="88" height="32" rx="16" fill="#18181b"/>
    <text x="-296" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#fafafa" text-anchor="middle" font-weight="500">Next.js</text>

    <!-- TypeScript -->
    <rect x="-238" y="0" width="108" height="32" rx="16" fill="#3178c6" opacity="0.12"/>
    <rect x="-238" y="0" width="108" height="32" rx="16" fill="none" stroke="#3178c6" stroke-width="1" opacity="0.4"/>
    <text x="-184" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3178c6" text-anchor="middle" font-weight="500">TypeScript</text>

    <!-- Tailwind -->
    <rect x="-116" y="0" width="92" height="32" rx="16" fill="#0ea5e9" opacity="0.12"/>
    <rect x="-116" y="0" width="92" height="32" rx="16" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.4"/>
    <text x="-70" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0284c7" text-anchor="middle" font-weight="500">Tailwind</text>

    <!-- Clerk -->
    <rect x="-10" y="0" width="72" height="32" rx="16" fill="#6c47ff" opacity="0.12"/>
    <rect x="-10" y="0" width="72" height="32" rx="16" fill="none" stroke="#6c47ff" stroke-width="1" opacity="0.4"/>
    <text x="26" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6c47ff" text-anchor="middle" font-weight="500">Clerk</text>

    <!-- Drizzle -->
    <rect x="76" y="0" width="80" height="32" rx="16" fill="#c5f74f" opacity="0.15"/>
    <rect x="76" y="0" width="80" height="32" rx="16" fill="none" stroke="#84cc16" stroke-width="1" opacity="0.5"/>
    <text x="116" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#65a30d" text-anchor="middle" font-weight="500">Drizzle</text>

    <!-- Sentry -->
    <rect x="170" y="0" width="78" height="32" rx="16" fill="#362d59" opacity="0.1"/>
    <rect x="170" y="0" width="78" height="32" rx="16" fill="none" stroke="#362d59" stroke-width="1" opacity="0.3"/>
    <text x="209" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#362d59" text-anchor="middle" font-weight="500">Sentry</text>

    <!-- PWA -->
    <rect x="262" y="0" width="64" height="32" rx="16" fill="#7c3aed" opacity="0.1"/>
    <rect x="262" y="0" width="64" height="32" rx="16" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <text x="294" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7c3aed" text-anchor="middle" font-weight="500">PWA</text>
  </g>

  <!-- Second badge row -->
  <g transform="translate(960, 784)">
    <!-- PostHog -->
    <rect x="-188" y="0" width="88" height="32" rx="16" fill="#f9a825" opacity="0.12"/>
    <rect x="-188" y="0" width="88" height="32" rx="16" fill="none" stroke="#f9a825" stroke-width="1" opacity="0.4"/>
    <text x="-144" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d97706" text-anchor="middle" font-weight="500">PostHog</text>

    <!-- Uploadthing -->
    <rect x="-86" y="0" width="110" height="32" rx="16" fill="#ef4444" opacity="0.08"/>
    <rect x="-86" y="0" width="110" height="32" rx="16" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
    <text x="-31" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#dc2626" text-anchor="middle" font-weight="500">Uploadthing</text>

    <!-- Upstash -->
    <rect x="38" y="0" width="84" height="32" rx="16" fill="#00e9a3" opacity="0.12"/>
    <rect x="38" y="0" width="84" height="32" rx="16" fill="none" stroke="#00e9a3" stroke-width="1" opacity="0.4"/>
    <text x="80" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#059669" text-anchor="middle" font-weight="500">Upstash</text>

    <!-- Neon -->
    <rect x="136" y="0" width="68" height="32" rx="16" fill="#00e699" opacity="0.12"/>
    <rect x="136" y="0" width="68" height="32" rx="16" fill="none" stroke="#00e699" stroke-width="1" opacity="0.3"/>
    <text x="170" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#059669" text-anchor="middle" font-weight="500">Neon</text>
  </g>
</svg>